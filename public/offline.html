<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LanFlow Offline</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eef4ef;
        color: #17201b;

  <body>
    <main>
      <h1>LanFlow ยังใช้งานแบบ Offline ได้</h1>
      <p>ข้อมูลที่บันทึกระหว่างไม่มีเน็ตจะรอซิงก์เมื่อกลับมาออนไลน์</p>
    </main>
  </body>
</html>
